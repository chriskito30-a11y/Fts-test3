<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Messages — Fais Ton Show</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
function setH(){ document.documentElement.style.setProperty("--app-h", window.innerHeight + "px"); }
setH(); window.addEventListener("resize", setH);
window.addEventListener("orientationchange", () => setTimeout(setH, 200));
</script>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
:root{
  --black:#0a0a0a; --white:#f5f2ee; --red:#d4201a; --gold:#c9a84c;
  --grey:#1c1c1c; --grey2:#161616; --muted:#888; --border:#2a2a2a;
}
html,body{ height:100%; background:var(--black); color:var(--white); font-family:"DM Sans",sans-serif; overflow:hidden; }

/* ── AUTH LOADING ── */
.auth-loading{ position:fixed; inset:0; background:var(--black); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; z-index:9999; }
.auth-logo{ font-family:"Bebas Neue",sans-serif; font-size:2rem; }
.auth-logo span{ color:var(--red); }
.auth-sub{ font-size:.65rem; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; }
.spinner{ width:24px; height:24px; border:2px solid #333; border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin{ to{transform:rotate(360deg)} }

/* ── LAYOUT ── */
.app{ display:flex; height:100vh; height:calc(var(--app-h,100vh)); }

/* ── SIDEBAR ── */
.sidebar{ width:260px; background:var(--grey2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-hdr{ padding:1.2rem 1rem .8rem; border-bottom:1px solid var(--border); }
.sidebar-logo{ font-family:"Bebas Neue",sans-serif; font-size:1.3rem; color:var(--red); }
.sidebar-sub{ font-size:.6rem; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-top:.1rem; }
.sidebar-user{ display:flex; align-items:center; gap:.5rem; padding:.7rem 1rem; border-bottom:1px solid var(--border); }
.uavatar{ width:26px; height:26px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:600; color:var(--white); flex-shrink:0; text-transform:uppercase; }
.uname{ font-size:.78rem; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Bouton nouveau message */
.btn-new-conv{ margin:.8rem; padding:.65rem; background:var(--red); border:none; color:var(--white); font-family:"Bebas Neue",sans-serif; font-size:1rem; letter-spacing:.06em; border-radius:3px; cursor:pointer; transition:background .2s; display:flex; align-items:center; justify-content:center; gap:.4rem; }
.btn-new-conv:hover{ background:#b71815; }

/* Liste conversations */
.conv-list{ flex:1; overflow-y:auto; }
.conv-list::-webkit-scrollbar{ width:3px; }
.conv-list::-webkit-scrollbar-thumb{ background:#2a2a2a; }
.conv-item{ display:flex; align-items:center; gap:.7rem; padding:.7rem 1rem; cursor:pointer; transition:background .15s; border-left:2px solid transparent; }
.conv-item:hover{ background:rgba(255,255,255,.03); }
.conv-item.active{ background:rgba(212,32,26,.08); border-left-color:var(--red); }
.conv-avatar{ width:34px; height:34px; border-radius:50%; background:#2a2a2a; display:flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:600; color:var(--muted); flex-shrink:0; text-transform:uppercase; }
.conv-avatar.group{ background:rgba(201,168,76,.15); color:var(--gold); font-size:1rem; }
.conv-info{ flex:1; min-width:0; }
.conv-name{ font-size:.82rem; font-weight:500; color:var(--white); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.conv-preview{ font-size:.7rem; color:#555; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:.1rem; }
.conv-meta{ display:flex; flex-direction:column; align-items:flex-end; gap:.2rem; flex-shrink:0; }
.conv-time{ font-size:.6rem; color:#444; }
.conv-badge{ background:var(--red); color:var(--white); font-size:.55rem; padding:.15rem .4rem; border-radius:8px; min-width:16px; text-align:center; }
.conv-empty{ padding:2rem 1rem; text-align:center; color:#444; font-size:.78rem; font-style:italic; }

/* Sidebar footer */
.sidebar-footer{ padding:.8rem 1rem; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:.4rem; }
.back-link{ font-size:.68rem; color:#444; text-decoration:none; transition:color .2s; }
.back-link:hover{ color:var(--muted); }
.btn-signout-sm{ background:transparent; border:1px solid #222; color:#444; padding:.3rem .6rem; border-radius:2px; cursor:pointer; font-size:.65rem; font-family:"DM Sans",sans-serif; transition:all .2s; text-align:left; }
.btn-signout-sm:hover{ border-color:var(--red); color:var(--red); }

/* ── MAIN ── */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; }

/* Empty state */
.empty-state{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.8rem; color:#333; text-align:center; padding:2rem; }
.empty-icon{ font-size:3rem; opacity:.3; }
.empty-title{ font-family:"Bebas Neue",sans-serif; font-size:1.8rem; color:#2a2a2a; }
.empty-sub{ font-size:.78rem; color:#333; }

/* Chat header */
.chat-hdr{ padding:.9rem 1.4rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.8rem; flex-shrink:0; background:var(--grey2); }
.chat-avatar{ width:32px; height:32px; border-radius:50%; background:#2a2a2a; display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:600; color:var(--muted); flex-shrink:0; text-transform:uppercase; }
.chat-avatar.group{ background:rgba(201,168,76,.15); color:var(--gold); font-size:1rem; }
.chat-title{ font-family:"Bebas Neue",sans-serif; font-size:1.2rem; letter-spacing:.04em; }
.chat-desc{ font-size:.68rem; color:var(--muted); margin-top:.05rem; }

/* Messages */
.messages{ flex:1; overflow-y:auto; padding:1rem 1.4rem; display:flex; flex-direction:column; gap:.5rem; scroll-behavior:smooth; }
.messages::-webkit-scrollbar{ width:4px; }
.messages::-webkit-scrollbar-thumb{ background:#2a2a2a; border-radius:2px; }
.day-sep{ text-align:center; margin:.8rem 0; position:relative; }
.day-sep::before{ content:""; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border); }
.day-sep span{ position:relative; background:var(--black); padding:0 .8rem; font-size:.6rem; color:#444; letter-spacing:.1em; text-transform:uppercase; }
.msg{ display:flex; flex-direction:column; max-width:72%; animation:msgIn .18s ease; }
@keyframes msgIn{ from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.msg.own{ align-self:flex-end; align-items:flex-end; }
.msg.other{ align-self:flex-start; align-items:flex-start; }
.msg-meta{ font-size:.62rem; color:#555; margin-bottom:.2rem; display:flex; align-items:center; gap:.4rem; }
.msg.own .msg-meta{ flex-direction:row-reverse; }
.msg-author{ color:var(--gold); font-weight:500; }
.msg-bubble{ padding:.55rem .85rem; border-radius:3px; font-size:.83rem; line-height:1.55; word-break:break-word; }
.msg.own   .msg-bubble{ background:rgba(212,32,26,.15); border:1px solid rgba(212,32,26,.25); border-bottom-right-radius:0; }
.msg.other .msg-bubble{ background:#141414; border:1px solid var(--border); border-bottom-left-radius:0; }

/* Input */
.input-area{ padding:.9rem 1.4rem; padding-bottom:calc(.9rem + env(safe-area-inset-bottom)); border-top:1px solid var(--border); background:var(--grey2); flex-shrink:0; }
.input-row{ display:flex; gap:.6rem; align-items:flex-end; }
.input-wrap{ flex:1; background:#0e0e0e; border:1px solid var(--border); border-radius:3px; display:flex; align-items:flex-end; transition:border-color .2s; }
.input-wrap:focus-within{ border-color:rgba(212,32,26,.4); }
.msg-input{ flex:1; background:transparent; border:none; color:var(--white); font-family:"DM Sans",sans-serif; font-size:.83rem; padding:.65rem .85rem; resize:none; outline:none; max-height:120px; line-height:1.5; }
.msg-input::placeholder{ color:#444; }
.btn-send{ background:var(--red); border:none; color:var(--white); width:38px; height:38px; border-radius:3px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; flex-shrink:0; font-size:1rem; }
.btn-send:hover{ background:#b71815; }

/* ── MODALS ── */
.modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:1000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal-overlay.hidden{ display:none; }
.modal{ background:var(--grey); border:1px solid var(--border); border-radius:4px; padding:2rem; width:95%; max-width:440px; max-height:85vh; overflow-y:auto; animation:modalIn .25s ease; }
@keyframes modalIn{ from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
.modal-title{ font-family:"Bebas Neue",sans-serif; font-size:1.8rem; margin-bottom:1.2rem; }
.modal-label{ font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:.5rem; margin-top:1rem; }
.modal-input{ width:100%; background:#0e0e0e; border:1px solid var(--border); border-radius:3px; color:var(--white); font-family:"DM Sans",sans-serif; font-size:.85rem; padding:.65rem .9rem; outline:none; transition:border-color .2s; margin-bottom:.8rem; }
.modal-input:focus{ border-color:rgba(212,32,26,.4); }
.modal-err{ font-size:.72rem; color:var(--red); min-height:1rem; margin-bottom:.3rem; }

/* Type selector (1-to-1 / groupe) */
.type-row{ display:flex; gap:.4rem; margin-bottom:1rem; }
.type-pill{ flex:1; padding:.55rem; background:#141414; border:1px solid var(--border); border-radius:3px; color:var(--muted); font-size:.75rem; cursor:pointer; text-align:center; transition:all .15s; font-family:"DM Sans",sans-serif; }
.type-pill:hover{ border-color:#444; color:var(--white); }
.type-pill.active{ background:var(--red); border-color:var(--red); color:var(--white); }

/* User list picker */
.user-search{ width:100%; background:#0e0e0e; border:1px solid var(--border); border-radius:3px; color:var(--white); font-family:"DM Sans",sans-serif; font-size:.82rem; padding:.55rem .8rem; outline:none; margin-bottom:.6rem; }
.user-list{ max-height:200px; overflow-y:auto; border:1px solid var(--border); border-radius:3px; }
.user-item{ display:flex; align-items:center; gap:.7rem; padding:.6rem .9rem; cursor:pointer; transition:background .15s; }
.user-item:hover{ background:rgba(255,255,255,.04); }
.user-item.selected{ background:rgba(212,32,26,.1); }
.user-item-avatar{ width:28px; height:28px; border-radius:50%; background:#2a2a2a; display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:600; color:var(--muted); flex-shrink:0; text-transform:uppercase; }
.user-item-name{ font-size:.82rem; flex:1; }
.user-item-role{ font-size:.6rem; color:#555; }
.user-item-check{ font-size:.9rem; color:var(--red); opacity:0; transition:opacity .15s; }
.user-item.selected .user-item-check{ opacity:1; }

.modal-row{ display:flex; gap:.5rem; margin-top:1rem; }
.modal-btn{ flex:1; padding:.8rem; background:var(--red); border:none; color:var(--white); font-family:"Bebas Neue",sans-serif; font-size:1.1rem; letter-spacing:.06em; border-radius:3px; cursor:pointer; transition:background .2s; }
.modal-btn:hover{ background:#b71815; }
.modal-btn.secondary{ background:transparent; border:1px solid #333; color:var(--muted); font-family:"DM Sans",sans-serif; font-size:.8rem; letter-spacing:0; }

/* ── RESPONSIVE MOBILE ── */
@media(max-width:640px){
  .sidebar{ width:100%; border-right:none; border-bottom:1px solid var(--border); height:auto; flex-shrink:0; }
  .sidebar-hdr,.sidebar-user,.sidebar-footer{ display:none; }
  .conv-list{ max-height:100px; }
  .btn-new-conv{ margin:.4rem .5rem; padding:.45rem; font-size:.85rem; }
  .app{ flex-direction:column; }
  .main{ flex:1; min-height:0; }
  .messages{ padding:.8rem; }
  .msg{ max-width:88%; }
  .input-area{ padding:.7rem .8rem; padding-bottom:calc(.7rem + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<!-- ── AUTH LOADING ── -->
<div class="auth-loading" id="auth-loading">
  <div class="auth-logo">FAIS TON <span>SHOW</span></div>
  <div class="spinner"></div>
  <div class="auth-sub">Chargement des messages…</div>
</div>

<!-- ── APP ── -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-hdr">
      <div class="sidebar-logo">FAIS TON SHOW</div>
      <div class="sidebar-sub">Messages privés</div>
    </div>
    <div class="sidebar-user">
      <div class="uavatar" id="uavatar">?</div>
      <div class="uname" id="uname">…</div>
    </div>
    <button class="btn-new-conv" onclick="openNewConvModal()">✉ Nouveau message</button>
    <div class="conv-list" id="conv-list">
      <div class="conv-empty">Aucune conversation</div>
    </div>
    <div class="sidebar-footer">
      <a class="back-link" href="membres.html">← Espace membres</a>
      <a class="back-link" href="forum.html">← Forum</a>
      <button class="btn-signout-sm" onclick="doSignOut()">Déconnexion</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✉️</div>
      <div class="empty-title">Messages privés</div>
      <div class="empty-sub">Sélectionne une conversation ou commence un nouveau message.</div>
    </div>

    <div id="chat-area" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="chat-hdr">
        <div class="chat-avatar" id="chat-avatar"></div>
        <div>
          <div class="chat-title" id="chat-title"></div>
          <div class="chat-desc" id="chat-desc"></div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div class="input-row">
          <div class="input-wrap">
            <textarea class="msg-input" id="msg-input" placeholder="Écris un message…" rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── MODAL NOUVEAU MESSAGE ── -->
<div class="modal-overlay hidden" id="new-conv-modal">
  <div class="modal">
    <div class="modal-title">Nouveau message</div>

    <div class="type-row">
      <div class="type-pill active" id="pill-direct" onclick="setConvType('direct')">👤 Message privé</div>
      <div class="type-pill" id="pill-group"  onclick="setConvType('group')">👥 Groupe privé</div>
    </div>

    <div id="group-name-row" style="display:none">
      <label class="modal-label">Nom du groupe</label>
      <input class="modal-input" id="group-name-input" type="text" placeholder="Ex : Équipe Théâtre…">
    </div>

    <label class="modal-label" id="members-label">Destinataire</label>
    <input class="user-search" id="user-search" type="text" placeholder="🔍 Rechercher un membre…" oninput="filterUsers()">
    <div class="user-list" id="user-list"></div>

    <div class="modal-err" id="new-conv-err"></div>
    <div class="modal-row">
      <button class="modal-btn secondary" onclick="closeNewConvModal()">Annuler</button>
      <button class="modal-btn" onclick="startConversation()">Démarrer →</button>
    </div>
  </div>
</div>

<script src="assets/js/fts-utils.js"></script>
<script src="assets/js/fts-firebase.js"></script>

<script>
/* ================================================================
   MESSAGES.JS — Messagerie privée Firebase
   ✅ Conversations 1-à-1 et groupes privés
   ✅ Temps réel Firebase RTDB
   ✅ Compteur non lus
   Structure RTDB :
     fts_dm/conversations/{convId}  → métadonnées
     fts_dm/messages/{convId}       → messages
     fts_dm/userConvs/{uid}/{convId} → index par user
   ================================================================ */

let db, auth;
let me = null;           // profil courant
let myUid = null;
let allUsers = {};       // uid → profil
let currentConvId = null;
let currentListener = null;
let convType = "direct"; // "direct" | "group"
let selectedUids = new Set();

/* ── INIT ────────────────────────────────────────────────────── */
window.addEventListener("DOMContentLoaded", function() {
  db   = FTS.initFirebase();
  auth = firebase.auth();

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = "auth.html"; return; }
    myUid = user.uid;

    try {
      const snap = await db.ref("fts_users/" + myUid).once("value");
      me = snap.val();
      if (!me || me.status !== "active") {
        await auth.signOut();
        window.location.href = "auth.html";
        return;
      }

      document.getElementById("auth-loading").style.display = "none";
      document.getElementById("app").style.display = "flex";

      const initials = me.name ? me.name.charAt(0).toUpperCase() : "?";
      document.getElementById("uavatar").textContent = initials;
      document.getElementById("uname").textContent   = me.name || user.email;

      await loadAllUsers();
      listenConversations();

    } catch(e) {
      console.warn("[FTS Messages]", e);
      window.location.href = "auth.html";
    }
  });
});

/* ── CHARGEMENT UTILISATEURS ─────────────────────────────────── */
async function loadAllUsers() {
  const snap = await db.ref("fts_users").orderByChild("status").equalTo("active").once("value");
  allUsers = {};
  if (snap.exists()) {
    snap.forEach(child => {
      if (child.key !== myUid) {
        allUsers[child.key] = child.val();
      }
    });
  }
}

/* ── ÉCOUTE CONVERSATIONS ────────────────────────────────────── */
function listenConversations() {
  db.ref("fts_dm/userConvs/" + myUid).on("value", async snap => {
    const convIds = snap.val() ? Object.keys(snap.val()) : [];
    if (!convIds.length) {
      document.getElementById("conv-list").innerHTML = '<div class="conv-empty">Aucune conversation</div>';
      return;
    }

    // Charger toutes les conversations
    const convPromises = convIds.map(id =>
      db.ref("fts_dm/conversations/" + id).once("value").then(s => ({ id, data: s.val() }))
    );
    const convs = (await Promise.all(convPromises))
      .filter(c => c.data)
      .sort((a, b) => (b.data.lastTs || 0) - (a.data.lastTs || 0));

    renderConvList(convs);
  });
}

/* ── RENDU LISTE CONVERSATIONS ───────────────────────────────── */
function renderConvList(convs) {
  const el = document.getElementById("conv-list");
  if (!convs.length) {
    el.innerHTML = '<div class="conv-empty">Aucune conversation</div>';
    return;
  }

  el.innerHTML = convs.map(({ id, data }) => {
    const isGroup    = data.type === "group";
    const unread     = (data.unread && data.unread[myUid]) || 0;
    const convName   = isGroup
      ? (data.name || "Groupe")
      : getOtherName(data.participants);
    const initials   = isGroup ? "👥" : convName.charAt(0).toUpperCase();
    const preview    = data.lastMessage
      ? FTS.esc(data.lastMessage.substring(0, 50))
      : "Nouvelle conversation";
    const time       = data.lastTs ? fmtTime(data.lastTs) : "";

    return `<div class="conv-item${id === currentConvId ? " active" : ""}" onclick="selectConversation('${id}')">
      <div class="conv-avatar${isGroup ? " group" : ""}">${initials}</div>
      <div class="conv-info">
        <div class="conv-name">${FTS.esc(convName)}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${time}</span>
        ${unread > 0 ? `<span class="conv-badge">${unread}</span>` : ""}
      </div>
    </div>`;
  }).join("");
}

function getOtherName(participants) {
  if (!participants) return "Inconnu";
  const otherUid = Object.keys(participants).find(uid => uid !== myUid);
  if (!otherUid) return "Moi";
  const u = allUsers[otherUid];
  return u ? u.name || u.email : "Membre";
}

/* ── SÉLECTION D'UNE CONVERSATION ────────────────────────────── */
async function selectConversation(convId) {
  currentConvId = convId;

  // Highlight dans la liste
  document.querySelectorAll(".conv-item").forEach(el => {
    el.classList.toggle("active", el.onclick.toString().includes(convId));
  });

  const snap = await db.ref("fts_dm/conversations/" + convId).once("value");
  const data = snap.val();
  if (!data) return;

  const isGroup  = data.type === "group";
  const convName = isGroup ? (data.name || "Groupe") : getOtherName(data.participants);
  const partCount = Object.keys(data.participants || {}).length;

  // Header
  const avatarEl = document.getElementById("chat-avatar");
  avatarEl.textContent = isGroup ? "👥" : convName.charAt(0).toUpperCase();
  avatarEl.className   = "chat-avatar" + (isGroup ? " group" : "");
  document.getElementById("chat-title").textContent = convName;
  document.getElementById("chat-desc").textContent  = isGroup
    ? `${partCount} participant${partCount > 1 ? "s" : ""}`
    : "Message privé";

  // Afficher le chat
  document.getElementById("empty-state").style.display  = "none";
  const chatArea = document.getElementById("chat-area");
  chatArea.style.display = "flex";

  // Messages
  document.getElementById("messages").innerHTML = "";
  if (currentListener) currentListener();

  const ref = db.ref("fts_dm/messages/" + convId).limitToLast(60);
  ref.on("child_added", snap => {
    const m = snap.val();
    appendMsg(m, m.senderId === myUid);
  });
  currentListener = () => ref.off();

  // Marquer comme lu
  db.ref("fts_dm/conversations/" + convId + "/unread/" + myUid).set(0);

  document.getElementById("msg-input").focus();
}

/* ── ENVOI D'UN MESSAGE ──────────────────────────────────────── */
async function sendMessage() {
  if (!currentConvId) return;
  const input = document.getElementById("msg-input");
  const text  = input.value.trim();
  if (!text) return;

  const msg = {
    senderId:   myUid,
    senderName: me.name || me.email,
    text,
    ts: Date.now(),
  };

  // Écrire le message
  await db.ref("fts_dm/messages/" + currentConvId).push(msg);

  // Mettre à jour la conversation
  const snap = await db.ref("fts_dm/conversations/" + currentConvId + "/participants").once("value");
  const participants = snap.val() || {};

  const updates = {
    ["fts_dm/conversations/" + currentConvId + "/lastMessage"]:   text.substring(0, 80),
    ["fts_dm/conversations/" + currentConvId + "/lastSenderName"]: me.name,
    ["fts_dm/conversations/" + currentConvId + "/lastTs"]:         msg.ts,
  };

  // Incrémenter non-lus pour les autres participants
  for (const uid of Object.keys(participants)) {
    if (uid !== myUid) {
      const unreadSnap = await db.ref("fts_dm/conversations/" + currentConvId + "/unread/" + uid).once("value");
      updates["fts_dm/conversations/" + currentConvId + "/unread/" + uid] = (unreadSnap.val() || 0) + 1;
    }
  }

  await db.ref().update(updates);

  input.value = "";
  input.style.height = "";
}

/* ── RENDU MESSAGE ───────────────────────────────────────────── */
function appendMsg(m, own) {
  const wrap    = document.getElementById("messages");
  const div     = document.createElement("div");
  div.className = "msg " + (own ? "own" : "other");
  div.innerHTML = `
    <div class="msg-meta">
      ${!own ? `<span class="msg-author">${FTS.esc(m.senderName)}</span>` : ""}
      <span>${fmtTime(m.ts)}</span>
    </div>
    <div class="msg-bubble">${FTS.esc(m.text).replace(/\n/g,"<br>")}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

/* ── MODAL NOUVEAU MESSAGE ────────────────────────────────────── */
function openNewConvModal() {
  selectedUids.clear();
  convType = "direct";
  document.getElementById("pill-direct").classList.add("active");
  document.getElementById("pill-group").classList.remove("active");
  document.getElementById("group-name-row").style.display = "none";
  document.getElementById("members-label").textContent = "Destinataire";
  document.getElementById("user-search").value = "";
  document.getElementById("new-conv-err").textContent = "";
  renderUserList(Object.entries(allUsers));
  document.getElementById("new-conv-modal").classList.remove("hidden");
}

function closeNewConvModal() {
  document.getElementById("new-conv-modal").classList.add("hidden");
}

function setConvType(type) {
  convType = type;
  document.getElementById("pill-direct").classList.toggle("active", type === "direct");
  document.getElementById("pill-group").classList.toggle("active",  type === "group");
  document.getElementById("group-name-row").style.display = type === "group" ? "block" : "none";
  document.getElementById("members-label").textContent = type === "group" ? "Membres du groupe" : "Destinataire";
  selectedUids.clear();
  renderUserList(Object.entries(allUsers));
}

function filterUsers() {
  const q = document.getElementById("user-search").value.toLowerCase();
  const filtered = Object.entries(allUsers).filter(([uid, u]) =>
    (u.name || u.email || "").toLowerCase().includes(q)
  );
  renderUserList(filtered);
}

function renderUserList(users) {
  const el = document.getElementById("user-list");
  if (!users.length) {
    el.innerHTML = '<div style="padding:.8rem 1rem;font-size:.78rem;color:#444">Aucun membre trouvé</div>';
    return;
  }
  el.innerHTML = users.map(([uid, u]) => {
    const selected = selectedUids.has(uid);
    const roleLabel = u.role === "admin" ? "🛡 Admin" : u.role === "prof" ? "🎓 Prof" : "";
    return `<div class="user-item${selected ? " selected" : ""}" onclick="toggleUser('${uid}')">
      <div class="user-item-avatar">${(u.name || u.email || "?").charAt(0).toUpperCase()}</div>
      <div class="user-item-name">${FTS.esc(u.name || u.email)}</div>
      ${roleLabel ? `<div class="user-item-role">${roleLabel}</div>` : ""}
      <span class="user-item-check">✓</span>
    </div>`;
  }).join("");
}

function toggleUser(uid) {
  if (convType === "direct") {
    // 1-à-1 : un seul destinataire
    selectedUids.clear();
    selectedUids.add(uid);
  } else {
    // Groupe : multi-sélection
    if (selectedUids.has(uid)) selectedUids.delete(uid);
    else selectedUids.add(uid);
  }
  renderUserList(Object.entries(allUsers).filter(([, u]) => {
    const q = document.getElementById("user-search").value.toLowerCase();
    return (u.name || u.email || "").toLowerCase().includes(q);
  }));
}

/* ── CRÉER / OUVRIR UNE CONVERSATION ─────────────────────────── */
async function startConversation() {
  const errEl = document.getElementById("new-conv-err");
  if (!selectedUids.size) { errEl.textContent = "Sélectionne au moins un membre."; return; }
  if (convType === "group" && !document.getElementById("group-name-input").value.trim()) {
    errEl.textContent = "Entre un nom pour le groupe."; return;
  }

  const participants = { [myUid]: true };
  selectedUids.forEach(uid => { participants[uid] = true; });

  let convId;

  if (convType === "direct") {
    // ID déterministe pour 1-à-1
    const otherUid = [...selectedUids][0];
    const uids = [myUid, otherUid].sort();
    convId = uids.join("_");

    // Vérifier si la conversation existe déjà
    const existing = await db.ref("fts_dm/conversations/" + convId).once("value");
    if (!existing.exists()) {
      await db.ref("fts_dm/conversations/" + convId).set({
        type: "direct",
        participants,
        lastMessage: "",
        lastTs: Date.now(),
        createdAt: Date.now(),
      });
      // Index par user
      await db.ref("fts_dm/userConvs/" + myUid + "/" + convId).set(true);
      await db.ref("fts_dm/userConvs/" + otherUid + "/" + convId).set(true);
    }

  } else {
    // Groupe : nouvel ID
    const ref = db.ref("fts_dm/conversations").push();
    convId = ref.key;
    const groupName = document.getElementById("group-name-input").value.trim();

    await ref.set({
      type: "group",
      name: groupName,
      participants,
      lastMessage: "",
      lastTs: Date.now(),
      createdAt: Date.now(),
      createdBy: myUid,
    });
    // Index pour tous les participants
    const indexUpdates = {};
    Object.keys(participants).forEach(uid => {
      indexUpdates["fts_dm/userConvs/" + uid + "/" + convId] = true;
    });
    await db.ref().update(indexUpdates);
  }

  closeNewConvModal();
  await selectConversation(convId);
}

/* ── UTILITAIRES ─────────────────────────────────────────────── */
function fmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
  }
  return d.toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit" });
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}
function doSignOut() {
  auth.signOut().then(() => window.location.href = "auth.html");
}
</script>
