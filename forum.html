<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forum — Fais Ton Show</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase SDK — Auth ajouté -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
function setH(){document.documentElement.style.setProperty("--app-h",window.innerHeight+"px");}
setH();window.addEventListener("resize",setH);
window.addEventListener("orientationchange",function(){setTimeout(setH,200);});
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f2ee;--red:#d4201a;--gold:#c9a84c;--grey:#1c1c1c;--grey2:#161616;--muted:#888;--border:#2a2a2a;--pending:#c9a84c}
html,body{height:100%;background:var(--black);color:var(--white);font-family:"DM Sans",sans-serif;overflow:hidden}
.app{display:flex;height:100vh;height:calc(var(--app-h,100vh))}

/* ── AUTH LOADING ── */
.auth-loading{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:9999}
.auth-loading-logo{font-family:"Bebas Neue",sans-serif;font-size:2rem;color:var(--white)}
.auth-loading-logo span{color:var(--red)}
.auth-loading-sub{font-size:.65rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.spinner{width:24px;height:24px;border:2px solid #333;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sidebar */
.sidebar{width:220px;background:var(--grey2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-hdr{padding:1.2rem 1rem .8rem;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;color:var(--red)}
.sidebar-sub{font-size:.6rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:.1rem}
.sidebar-user{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;border-bottom:1px solid var(--border)}
.uavatar{width:26px;height:26px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--white);flex-shrink:0;text-transform:uppercase}
.uname{font-size:.78rem;color:var(--muted);flex:1}
.channels-lbl{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:#444;padding:.8rem 1rem .4rem}
.channel-list{flex:1;overflow-y:auto;padding:.2rem 0}
.channel{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;font-size:.82rem;color:var(--muted)}
.channel:hover{background:rgba(255,255,255,.03);color:var(--white)}
.channel.active{background:rgba(212,32,26,.08);border-left-color:var(--red);color:var(--white)}
.channel-icon{font-size:1rem;flex-shrink:0}
.sidebar-footer{padding:.8rem 1rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.5rem}
.back-link{font-size:.68rem;color:#444;text-decoration:none;display:flex;align-items:center;gap:.35rem;transition:color .2s}
.back-link:hover{color:var(--muted)}
.btn-signout-forum{background:transparent;border:1px solid #222;color:#444;padding:.35rem .7rem;border-radius:2px;cursor:pointer;font-size:.65rem;font-family:"DM Sans",sans-serif;transition:all .2s;text-align:left}
.btn-signout-forum:hover{border-color:var(--red);color:var(--red)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.pending-bar{background:#1a1500;border-bottom:1px solid rgba(201,168,76,.3);padding:.55rem 1.4rem;font-size:.72rem;color:var(--gold);display:none;align-items:center;gap:.5rem;flex-shrink:0}
.pending-bar.show{display:flex}
.chat-hdr{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;flex-shrink:0;background:var(--grey2)}
.chat-icon{font-size:1.3rem}
.chat-title{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:.04em}
.chat-desc{font-size:.7rem;color:var(--muted);margin-top:.05rem}
.btn-admin-gear{background:transparent;border:none;cursor:pointer;font-size:1.1rem;padding:.2rem .4rem;opacity:.3;transition:opacity .2s;margin-left:.4rem;display:none}
.btn-admin-gear:hover{opacity:1}
.btn-admin-gear.active{opacity:1;filter:drop-shadow(0 0 4px var(--red))}
.btn-admin-gear.visible{display:inline-flex}
.btn-admin-link{display:none;align-items:center;gap:.3rem;padding:.3rem .7rem;background:transparent;border:1px solid #333;border-radius:2px;color:#555;font-size:.65rem;text-decoration:none;transition:all .2s;white-space:nowrap}
.btn-admin-link:hover{border-color:var(--red);color:var(--white)}
.btn-admin-link.visible{display:inline-flex}
.btn-profs-link{display:none;align-items:center;gap:.3rem;padding:.3rem .7rem;background:transparent;border:1px solid #333;border-radius:2px;color:#555;font-size:.65rem;text-decoration:none;transition:all .2s;white-space:nowrap}
.btn-profs-link:hover{border-color:var(--gold);color:var(--gold)}
.btn-profs-link.visible{display:inline-flex}
.admin-bar{background:#1a0a0a;border-bottom:1px solid #3a1a1a;padding:.4rem 1.4rem;font-size:.68rem;color:#aa5a5a;display:none;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-bar.show{display:flex}
.btn-exit-admin{background:transparent;border:1px solid #3a1a1a;color:#aa5a5a;padding:.2rem .6rem;border-radius:2px;cursor:pointer;font-size:.65rem}
.btn-exit-admin:hover{border-color:var(--red);color:var(--white)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:1rem 1.4rem;display:flex;flex-direction:column;gap:.5rem;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.day-sep{text-align:center;margin:.8rem 0;position:relative}
.day-sep::before{content:"";position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.day-sep span{position:relative;background:var(--black);padding:0 .8rem;font-size:.6rem;color:#444;letter-spacing:.1em;text-transform:uppercase}
.msg{display:flex;flex-direction:column;max-width:72%;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.own{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg-meta{font-size:.62rem;color:#555;margin-bottom:.2rem;display:flex;align-items:center;gap:.4rem}
.msg.own .msg-meta{flex-direction:row-reverse}
.msg-author{color:var(--gold);font-weight:500}
.msg-bubble{padding:.55rem .85rem;border-radius:3px;font-size:.83rem;line-height:1.55;word-break:break-word}
.msg.own .msg-bubble{background:rgba(212,32,26,.15);border:1px solid rgba(212,32,26,.25);border-bottom-right-radius:0}
.msg.other .msg-bubble{background:#141414;border:1px solid var(--border);border-bottom-left-radius:0}
.btn-del-msg{background:transparent;border:none;color:#555;cursor:pointer;font-size:.7rem;padding:.15rem .4rem;transition:color .2s;margin-top:.2rem;display:block}
.btn-del-msg:hover{color:var(--red)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#333;text-align:center;gap:.5rem}
.empty-icon{font-size:2.5rem;opacity:.3}

/* Input */
.input-area{padding:.9rem 1.4rem;padding-bottom:calc(.9rem + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--grey2);flex-shrink:0}
.input-row{display:flex;gap:.6rem;align-items:flex-end}
.input-wrap{flex:1;background:#0e0e0e;border:1px solid var(--border);border-radius:3px;display:flex;align-items:flex-end;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(212,32,26,.4)}
.msg-input{flex:1;background:transparent;border:none;color:var(--white);font-family:"DM Sans",sans-serif;font-size:.83rem;padding:.65rem .85rem;resize:none;outline:none;max-height:120px;line-height:1.5}
.msg-input::placeholder{color:#444}
.btn-send{background:var(--red);border:none;color:var(--white);width:38px;height:38px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;font-size:1rem}
.btn-send:hover{background:#b71815}
.btn-attach{background:transparent;border:1px solid var(--border);color:var(--muted);width:38px;height:38px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:1rem}
.btn-attach:hover{border-color:var(--gold);color:var(--gold)}
.upload-bar{display:none;padding:.5rem 1.4rem;background:#0e0e0e;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted);flex-shrink:0;align-items:center;gap:.8rem}
.upload-bar.show{display:flex}
.upload-track{flex:1;background:#2a2a2a;border-radius:2px;height:4px;overflow:hidden}
.upload-fill{height:100%;background:var(--red);width:0%;transition:width .2s;border-radius:2px}
.msg-img{max-width:100%;max-height:260px;border-radius:3px;margin-top:.3rem;display:block;cursor:pointer}
.msg-video{max-width:100%;max-height:260px;border-radius:3px;margin-top:.3rem;display:block}
.msg-pdf{display:inline-flex;align-items:center;gap:.5rem;margin-top:.3rem;padding:.4rem .8rem;background:#141414;border:1px solid var(--border);border-radius:3px;font-size:.75rem;color:var(--gold);text-decoration:none}
.msg-pdf:hover{border-color:var(--gold)}
.pill-container{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.2rem}
.pill{background:#141414;border:1px solid var(--border);padding:.4rem .7rem;border-radius:3px;font-size:.75rem;cursor:pointer;transition:all .15s;color:var(--muted);user-select:none}
.pill:hover{border-color:#444;color:var(--white)}
.pill.active{background:var(--red);border-color:var(--red);color:white;font-weight:500}

/* Notifications */
.btn-notif{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.35rem .8rem;border-radius:20px;cursor:pointer;font-size:.68rem;transition:all .2s;width:100%;text-align:left}
.btn-notif:hover{border-color:var(--gold);color:var(--gold)}
.btn-notif.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.notif-banner{background:linear-gradient(135deg,rgba(212,32,26,.15),rgba(201,168,76,.1));border-bottom:1px solid rgba(212,32,26,.3);padding:.8rem 1.4rem;display:flex;align-items:center;gap:.8rem;cursor:pointer;flex-shrink:0;transition:background .2s}
.notif-banner:hover{background:linear-gradient(135deg,rgba(212,32,26,.25),rgba(201,168,76,.15))}
.notif-banner.hidden{display:none}
.notif-banner-icon{font-size:1.4rem;flex-shrink:0}
.notif-banner-text{flex:1}
.notif-banner-title{font-size:.8rem;font-weight:500;color:var(--white);margin-bottom:.1rem}
.notif-banner-sub{font-size:.68rem;color:var(--muted)}
.notif-banner-btn{background:var(--red);border:none;color:var(--white);padding:.45rem 1rem;border-radius:20px;font-size:.75rem;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}
.notif-banner-close{background:transparent;border:none;color:#555;font-size:1rem;cursor:pointer;padding:.2rem;flex-shrink:0;line-height:1}
.notif-banner-close:hover{color:var(--muted)}

@media(max-width:640px){
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-hdr,.sidebar-user,.channels-lbl,.sidebar-footer{display:none}
  .channel-list{display:flex;flex-direction:row;padding:.4rem .5rem;gap:.3rem;overflow-x:auto;width:100%}
  .channel{padding:.4rem .75rem;border-left:none;border-bottom:2px solid transparent;border-radius:3px;white-space:nowrap;font-size:.75rem}
  .channel.active{border-bottom-color:var(--red);background:rgba(212,32,26,.08)}
  .app{flex-direction:column}
  .main{flex:1;min-height:0}
  .messages{padding:.8rem}
  .msg{max-width:88%}
  .input-area{padding:.7rem .8rem;padding-bottom:calc(.7rem + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<!-- ── ÉCRAN DE CHARGEMENT AUTH ── -->
<div class="auth-loading" id="auth-loading">
  <div class="auth-loading-logo">FAIS TON <span>SHOW</span></div>
  <div class="spinner"></div>
  <div class="auth-loading-sub">Chargement du forum…</div>
</div>

<!-- ── APPLICATION (cachée jusqu'à auth OK) ── -->
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-hdr">
      <div class="sidebar-logo">FAIS TON SHOW</div>
      <div class="sidebar-sub">Forum</div>
    </div>
    <div class="sidebar-user">
      <div class="uavatar" id="uavatar">?</div>
      <div class="uname" id="uname">…</div>
    </div>
    <div class="channels-lbl">Canaux</div>
    <div class="channel-list" id="channel-list"></div>
    <div class="sidebar-footer">
      <button class="btn-notif" id="btn-notif" onclick="toggleNotifications()">🔕 Activer les notifs</button>
      <a class="back-link" href="membres.html">← Espace membres</a>
      <a class="back-link" href="messages.html">✉️ Messages privés</a>
      <button class="btn-signout-forum" onclick="doSignOut()">Déconnexion</button>
    </div>
  </div>

  <div class="main">
    <div class="pending-bar" id="pending-bar">⏳ Accès en attente de validation</div>
    <div class="admin-bar" id="admin-bar">
      ⚠️ Mode administration actif
      <button class="btn-exit-admin" onclick="exitAdmin()">Quitter</button>
    </div>
    <div class="chat-hdr">
      <div class="chat-icon" id="ch-icon">💬</div>
      <div>
        <div class="chat-title" id="ch-title">Général</div>
        <div class="chat-desc" id="ch-desc">Discussion ouverte à tous</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:.5rem">
        <!-- Visible pour les profs et admins -->
        <a class="btn-profs-link" id="btn-profs-link" href="profs.html">🎓 Profs</a>
        <!-- Visible uniquement pour les admins -->
        <a class="btn-admin-link" id="btn-admin-link" href="forum-admin.html">🛡 Admin</a>
        <button class="btn-admin-gear" id="btn-gear" onclick="toggleAdminMode()">⚙️</button>
      </div>
    </div>
    <div class="notif-banner hidden" id="notif-banner">
      <span class="notif-banner-icon">🔔</span>
      <div class="notif-banner-text">
        <div class="notif-banner-title">Ne rate aucun message !</div>
        <div class="notif-banner-sub">Active les notifications pour ton groupe</div>
      </div>
      <button class="notif-banner-btn" onclick="activerNotifs()">Activer</button>
      <button class="notif-banner-close" onclick="fermerBanniere()">✕</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="upload-bar" id="upload-bar">
      <span id="upload-txt">Upload en cours…</span>
      <div class="upload-track"><div class="upload-fill" id="upload-fill"></div></div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input type="file" id="file-input" accept="image/*,video/*,.pdf,.mp3" style="display:none" onchange="uploadMedia(this.files[0])">
        <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="Joindre un fichier">📎</button>
        <div class="input-wrap">
          <textarea class="msg-input" id="msg-input" placeholder="Écris un message…" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   FORUM.JS — Chat temps réel Firebase
   ✅ Auth via Firebase Auth (remplace localStorage UID)
   ✅ Admin détecté via role RTDB (remplace mot de passe en clair)
   ✅ Canaux filtrés selon disciplines du profil
   ================================================================ */

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBlN-h7D-QWyGmZ4B59AVJkDIQ5molioq0",
  authDomain:        "faistonshow30.firebaseapp.com",
  databaseURL:       "https://faistonshow30-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "faistonshow30",
  storageBucket:     "faistonshow30.firebasestorage.app",
  messagingSenderId: "115713812172",
  appId:             "1:115713812172:web:db8db53a9a9ad819f00469"
};

const CLOUD_NAME   = "dsylvtwqr";
const UPLOAD_PRESET = "FaisTonShow";
const WORKER_URL   = "https://fts-push.gros-christophe.workers.dev";
const VAPID_PUBLIC_KEY = "BNenngaKqOtgqvFSo2KJipS0AwVChpzacAX5YSNZmizWLeji07auoKRZBMbOxRljvqz89QigB6esPcHfEDS_nik";

let db;
let uid, userData, userProfile;
let currentChannel  = "general";
let currentListener = null;
let adminMode       = false;

/* ── UTILITAIRES ──────────────────────────────────────────────── */
function norm(s){ return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,""); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function catIcon(s){ const c=norm(s); if(c.includes("theat"))return"🎭"; if(c.includes("dans"))return"💃"; if(c.includes("chant"))return"🎤"; if(c.includes("musi"))return"🎸"; if(c.includes("singer"))return"⭐"; if(c.includes("comedie"))return"🎬"; if(c.includes("atelier"))return"🎨"; return"💬"; }
function scrollBottom(){ const w=document.getElementById("messages"); w.scrollTop=w.scrollHeight; }
function storageGet(k){ return localStorage.getItem(k); }
function storageSet(k,v){ localStorage.setItem(k,v); }

/* ── INITIALISATION ───────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", async function() {

  // Service Worker pour les notifications push
  if ("serviceWorker" in navigator) {
    try { await navigator.serviceWorker.register("./sw.js", {scope:"./"}); }
    catch(e) { console.warn("[FTS] SW :", e); }
  }

  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e) {
    console.warn("[FTS] Firebase init :", e);
  }

  // Écoute de l'état d'authentification
  firebase.auth().onAuthStateChanged(async user => {

    if (!user) {
      window.location.href = "auth.html";
      return;
    }

    uid = user.uid;

    try {
      // 1. Charger le profil principal (fts_users)
      const snap = await db.ref("fts_users/" + uid).once("value");
      userProfile = snap.val();

      if (!userProfile || userProfile.status === "pending") {
        await firebase.auth().signOut();
        window.location.href = "auth.html";
        return;
      }

      // 2. Admin détecté via le rôle — plus de mot de passe
      // Boutons selon rôle
      if (userProfile.role === "admin") {
        adminMode = true;
        document.getElementById("btn-gear").classList.add("visible", "active");
        document.getElementById("btn-admin-link").classList.add("visible");
        document.getElementById("btn-profs-link").classList.add("visible");
        document.getElementById("admin-bar").classList.add("show");
      } else if (userProfile.role === "prof") {
        document.getElementById("btn-profs-link").classList.add("visible");
      }

      // 3. Charger ou créer le profil forum (fts_forum/users)
      await loadUserData();

      // 4. Afficher l'app
      document.getElementById("auth-loading").style.display = "none";
      document.getElementById("app").style.display          = "flex";

    } catch(e) {
      console.warn("[FTS] Erreur chargement profil :", e);
      window.location.href = "auth.html";
    }
  });
});

/* ── PROFIL FORUM ─────────────────────────────────────────────── */
async function loadUserData() {
  const snap = await db.ref("fts_forum/users/" + uid).once("value");

  if (snap.exists()) {
    userData = snap.val();
  } else {
    // Création automatique depuis le profil principal (migration / premier accès)
    userData = {
      name:     userProfile.name || userProfile.email,
      group:    (userProfile.disciplines || []).join(", "),
      subgroup: "",
      status:   userProfile.status || "active",
      ts:       Date.now(),
    };
    await db.ref("fts_forum/users/" + uid).set(userData);
  }

  listenUserStatus();
  enterForum();
}

function listenUserStatus() {
  db.ref("fts_forum/users/" + uid + "/status").on("value", snap => {
    if (snap.exists()) {
      userData.status = snap.val();
      updateStatusUI();
      renderChannels();
    }
  });
}

function enterForum() {
  const initials = userData.name ? userData.name.charAt(0).toUpperCase() : "?";
  document.getElementById("uavatar").textContent = initials;
  document.getElementById("uname").textContent   = userData.name;
  updateStatusUI();
  renderChannels();
  switchChannel("general");
  checkNotifStatus();
}

function updateStatusUI() {
  document.getElementById("pending-bar").classList.toggle("show",
    userData.status === "pending" && userProfile.role !== "admin");
}

/* ── CANAUX ───────────────────────────────────────────────────── */
function getUserChannels() {
  const channels = [{id:"general", icon:"💬", name:"Général", desc:"Ouvert à tous"}];

  // Admin voit tous les canaux depuis le profil forum
  const isAdmin = userProfile && userProfile.role === "admin";

  if (userData && userData.status === "active" || isAdmin) {

    // Canaux disciplines
    const groups = (userData.group || "").split(", ").filter(Boolean);
    groups.forEach(c => {
      channels.push({ id: norm(c), icon: catIcon(c), name: c, desc: "Canal " + c });
    });

    // Canaux créneaux (sous-groupes assignés par l'admin)
    const subs = (userData.subgroup || "").split(", ").filter(Boolean);
    subs.forEach(s => {
      channels.push({ id: norm(s), icon: "📅", name: s, desc: "Créneau " + s });
    });
  }

  return channels;
}

function renderChannels() {
  const list = document.getElementById("channel-list");
  const channels = getUserChannels();
  list.innerHTML = channels.map(c => `
    <div class="channel${c.id === currentChannel ? " active" : ""}" onclick="switchChannel('${esc(c.id)}')">
      <span class="channel-icon">${c.icon}</span>
      <span>${esc(c.name)}</span>
    </div>`).join("");
}

function switchChannel(id) {
  const ch = getUserChannels().find(c => c.id === id) || getUserChannels()[0];
  currentChannel = ch.id;
  renderChannels();
  document.getElementById("ch-icon").textContent  = ch.icon;
  document.getElementById("ch-title").textContent = ch.name;
  document.getElementById("ch-desc").textContent  = ch.desc;
  document.getElementById("messages").innerHTML   = "";
  if (currentListener) currentListener();
  loadMessages(ch.id);
}

/* ── MESSAGES ─────────────────────────────────────────────────── */
function loadMessages(id) {
  const ref = db.ref("fts_forum/messages/" + id).limitToLast(50);
  ref.on("child_added", snap => {
    appendMsg(snap.val(), snap.val().name === userData.name, snap.key);
  });
  currentListener = () => ref.off();
}

function sendMessage() {
  const input = document.getElementById("msg-input");
  const txt   = input.value.trim();
  if (!txt) return;
  db.ref("fts_forum/messages/" + currentChannel).push({
    name: userData.name,
    text: txt,
    ts:   Date.now()
  });
  notifyChannel(currentChannel, userData.name + " : " + txt.substring(0, 80));
  input.value = "";
  input.style.height = "";
}

function appendMsg(m, own, key) {
  const wrap    = document.getElementById("messages");
  const div     = document.createElement("div");
  div.className = "msg " + (own ? "own" : "other");
  const isMedia  = m.text && m.text.startsWith("[media]");
  const mediaUrl = isMedia ? m.text.slice(7) : null;
  div.innerHTML = `
    <div class="msg-meta">
      ${!own ? `<span class="msg-author">${esc(m.name)}</span>` : ""}
      <span>${new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
    </div>
    ${isMedia
      ? `<div class="msg-bubble">${renderMedia(mediaUrl)}</div>`
      : `<div class="msg-bubble">${esc(m.text).replace(/\n/g,"<br>")}</div>`}
    ${adminMode ? `<button class="btn-del-msg" onclick="deleteMsg('${key}')">🗑</button>` : ""}`;
  wrap.appendChild(div);
  scrollBottom();
}

function deleteMsg(k) {
  if (confirm("Supprimer ce message ?"))
    db.ref("fts_forum/messages/" + currentChannel + "/" + k).remove();
}

/* ── ADMIN ────────────────────────────────────────────────────── */
function toggleAdminMode() {
  // Uniquement accessible si role === admin (bouton visible seulement pour les admins)
  if (!userProfile || userProfile.role !== "admin") return;
  adminMode = !adminMode;
  document.getElementById("admin-bar").classList.toggle("show", adminMode);
  document.getElementById("btn-gear").classList.toggle("active", adminMode);
  switchChannel(currentChannel); // Refresh affichage boutons suppression
}

function exitAdmin() {
  adminMode = false;
  document.getElementById("admin-bar").classList.remove("show");
  document.getElementById("btn-gear").classList.remove("active");
  switchChannel(currentChannel);
}

/* ── DÉCONNEXION ─────────────────────────────────────────────── */
function doSignOut() {
  firebase.auth().signOut().then(() => {
    window.location.href = "auth.html";
  });
}

/* ── CLAVIER & RESIZE TEXTAREA ────────────────────────────────── */
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

/* ── UPLOAD MÉDIA ─────────────────────────────────────────────── */
function uploadMedia(file) {
  if (!file) return;
  if (file.size > 100 * 1024 * 1024) { alert("Fichier trop volumineux (max 100 Mo)"); return; }
  const bar  = document.getElementById("upload-bar");
  const fill = document.getElementById("upload-fill");
  const txt  = document.getElementById("upload-txt");
  bar.classList.add("show");
  fill.style.width   = "0%";
  fill.style.background = "var(--red)";
  txt.textContent    = "Upload en cours…";
  const fd = new FormData();
  const cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/[^a-zA-Z0-9_-]/g, "_");
  fd.append("file", file);
  fd.append("upload_preset", UPLOAD_PRESET);
  fd.append("public_id", "forum/" + cleanName);
  fd.append("resource_type", "auto");
  const xhr = new XMLHttpRequest();
  xhr.open("POST", "https://api.cloudinary.com/v1_1/" + CLOUD_NAME + "/auto/upload");
  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      const pct = Math.round(e.loaded / e.total * 100);
      fill.style.width  = pct + "%";
      txt.textContent   = "Upload " + pct + "%…";
    }
  };
  xhr.onload = function() {
    if (xhr.status === 200) {
      const res = JSON.parse(xhr.responseText);
      fill.style.background = "#22c55e";
      txt.textContent = "✓ " + file.name;
      setTimeout(() => bar.classList.remove("show"), 2000);
      document.getElementById("file-input").value = "";
      if (db && userData) {
        db.ref("fts_forum/messages/" + currentChannel).push({
          name: userData.name, text: "[media]" + res.secure_url, ts: Date.now()
        });
      }
    } else {
      txt.textContent = "Erreur upload";
      setTimeout(() => bar.classList.remove("show"), 3000);
    }
  };
  xhr.onerror = function() {
    txt.textContent = "Erreur réseau";
    setTimeout(() => bar.classList.remove("show"), 3000);
  };
  xhr.send(fd);
}

function renderMedia(url) {
  const isCloudImg   = url.includes("/image/upload/");
  const isCloudVideo = url.includes("/video/upload/");
  const ext = url.split("?")[0].split(".").pop().toLowerCase();
  const isImg    = isCloudImg  || ["jpg","jpeg","png","gif","webp"].includes(ext);
  const isVideo  = (isCloudVideo && !["mp3","wav","ogg","aac","m4a"].includes(ext)) || ["mp4","mov","webm"].includes(ext);
  const isAudio  = ["mp3","wav","ogg","aac","m4a"].includes(ext) || (isCloudVideo && ["mp3","wav","ogg","aac","m4a"].includes(ext));
  const isPdf    = ext === "pdf";
  if (isImg)   return `<img class="msg-img" src="${url}" onclick="window.open('${url}')">`;
  if (isVideo) return `<video class="msg-video" src="${url}" controls playsinline></video>`;
  if (isAudio) {
    const fname = decodeURIComponent(url.split("/").pop().split("?")[0]);
    return `<div style="margin-top:.4rem">
      <div style="font-size:.72rem;color:var(--gold);margin-bottom:.3rem">🎵 ${fname}</div>
      <audio controls preload="none" style="width:100%;min-width:200px;display:block"><source src="${url}" type="audio/mpeg"></audio>
      <a href="${url}" target="_blank" style="font-size:.65rem;color:var(--muted);text-decoration:none;display:block;margin-top:.2rem">Écouter / Télécharger</a>
    </div>`;
  }
  if (isPdf) return `<a class="msg-pdf" href="${url}" target="_blank">📄 Ouvrir le PDF</a>`;
  return `<a class="msg-pdf" href="${url}" target="_blank">📎 Fichier joint</a>`;
}

/* ── NOTIFICATIONS PUSH ───────────────────────────────────────── */
function urlBase64ToUint8Array(b64) {
  const pad  = "=".repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw  = window.atob(base64);
  const arr  = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

async function getSubscription() {
  if (!("serviceWorker" in navigator)) return null;
  const reg = await navigator.serviceWorker.ready;
  return reg.pushManager.getSubscription();
}

async function checkNotifStatus() {
  const sub = await getSubscription();
  updateNotifBtn(!!sub);
  const banner = document.getElementById("notif-banner");
  if (Notification.permission === "denied") {
    banner.classList.remove("hidden");
    banner.querySelector(".notif-banner-title").textContent = "Notifications bloquées";
    banner.querySelector(".notif-banner-sub").textContent   = "Clique sur le 🔒 dans la barre d'adresse → Autoriser";
    banner.querySelector(".notif-banner-btn").style.display = "none";
    banner.querySelector(".notif-banner-icon").textContent  = "⚠️";
  } else if (!sub && !storageGet("fts_notif_dismissed")) {
    banner.classList.remove("hidden");
  } else {
    banner.classList.add("hidden");
  }
}

async function activerNotifs() {
  document.getElementById("notif-banner").classList.add("hidden");
  await subscribePush();
}

function fermerBanniere() {
  document.getElementById("notif-banner").classList.add("hidden");
  storageSet("fts_notif_dismissed", "1");
}

function updateNotifBtn(on) {
  const btn = document.getElementById("btn-notif");
  if (!btn) return;
  btn.textContent = on ? "🔔 Notifs activées" : "🔕 Activer les notifs";
  btn.classList.toggle("on", on);
}

async function toggleNotifications() {
  const sub = await getSubscription();
  if (sub) {
    await sub.unsubscribe();
    fetch(WORKER_URL + "/unsubscribe", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({uid})
    }).catch(() => {});
    updateNotifBtn(false);
  } else {
    await subscribePush();
  }
}

async function subscribePush() {
  try {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { alert("Autorise les notifications pour continuer."); return; }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    await fetch(WORKER_URL + "/subscribe", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        uid,
        subscription: sub.toJSON(),
        group:    userData ? userData.group    : "",
        subgroup: userData ? userData.subgroup : ""
      })
    });
    updateNotifBtn(true);
  } catch(e) {
    console.error("Push :", e);
    alert("Erreur notifications : " + e.message);
  }
}

function notifyChannel(channel, body) {
  const ch = getUserChannels().find(c => c.id === channel) || {name:"Forum"};
  let group = "", subgroup = "";
  if (userData) {
    (userData.group    || "").split(", ").forEach(g => { if (norm(g) === channel) group    = g; });
    (userData.subgroup || "").split(", ").forEach(s => { if (norm(s) === channel) subgroup = s; });
  }
  fetch(WORKER_URL + "/notify", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      group, subgroup,
      title: "FTS — " + ch.name, body,
      url:   "/forum.html",
      senderUid: uid
    })
  }).catch(() => {});
}
