<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forum — Fais Ton Show</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ✅ Design system partagé -->
<link rel="stylesheet" href="assets/css/fts.css">

<!-- Firebase SDK (chargés en <head> pour être dispo avant DOMContentLoaded) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!--
  setH() DOIT rester ici en <head> : il fixe --app-h IMMÉDIATEMENT,
  avant tout rendu CSS, pour éviter le flash de layout sur mobile.
-->
<script>
function setH() { document.documentElement.style.setProperty("--app-h", window.innerHeight + "px"); }
setH();
window.addEventListener("resize", setH);
window.addEventListener("orientationchange", function() { setTimeout(setH, 200); });
</script>

<!--
  CSS SUPPRIMÉ car déjà dans fts.css :
    reset, :root variables, html/body base,
    .modal-overlay + .hidden, .pill-container,
    .pill.active, .empty-state, .empty-icon,
    @keyframes msgIn (déjà dans fts.css comme msgIn)

  CSS CONSERVÉ ici : tout ce qui est spécifique au forum.
-->
<style>

/* ── OVERRIDE BASE ───────────────────────────────────────────────
   Le forum est un "app shell" plein écran.
   fts.css pose min-height:100% + overflow-x:hidden.
   On surcharge pour le layout chat.
──────────────────────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden; /* bloque le scroll global — le scroll est dans .messages */
}

/* ── APP SHELL ───────────────────────────────────────────────── */
.app {
  display: flex;
  height: 100vh;
  height: calc(var(--app-h, 100vh));
}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar {
  width: 220px;
  background: var(--grey2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-hdr {
  padding: 1.2rem 1rem .8rem;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  font-family: var(--font-display);
  font-size: 1.3rem;
  color: var(--red);
}

.sidebar-sub {
  font-size: .6rem;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-top: .1rem;
}

.sidebar-user {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .7rem 1rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.sidebar-user:hover .uname { color: var(--white); }

.uavatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .7rem;
  font-weight: 600;
  color: var(--white);
  flex-shrink: 0;
  text-transform: uppercase;
}

.uavatar.pending { background: var(--gold); }

.uname  { font-size: .78rem; color: var(--muted); flex: 1; transition: color .2s; }
.uedit  { font-size: .6rem; color: #333; }

.channels-lbl {
  font-size: .55rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #444;
  padding: .8rem 1rem .4rem;
}

.channel-list { flex: 1; overflow-y: auto; padding: .2rem 0; }

.channel {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .55rem 1rem;
  cursor: pointer;
  transition: background .15s;
  border-left: 2px solid transparent;
  font-size: .82rem;
  color: var(--muted);
}

.channel:hover  { background: rgba(255,255,255,.03); color: var(--white); }

.channel.active {
  background: rgba(212,32,26,.08);
  border-left-color: var(--red);
  color: var(--white);
}

.channel-icon { font-size: 1rem; flex-shrink: 0; }

.sidebar-footer { padding: .8rem 1rem; border-top: 1px solid var(--border); }

.back-link {
  font-size: .68rem;
  color: #444;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: .35rem;
  transition: color .2s;
}

.back-link:hover { color: var(--muted); }

/* ── ZONE PRINCIPALE ─────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Bandeau statut "en attente" */
.pending-bar {
  background: #1a1500;
  border-bottom: 1px solid rgba(201,168,76,.3);
  padding: .55rem 1.4rem;
  font-size: .72rem;
  color: var(--gold);
  display: none;
  align-items: center;
  gap: .5rem;
  flex-shrink: 0;
}

.pending-bar.show { display: flex; }

/* En-tête du canal */
.chat-hdr {
  padding: .9rem 1.4rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: .8rem;
  flex-shrink: 0;
  background: var(--grey2);
}

.chat-icon  { font-size: 1.3rem; }
.chat-title { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: .04em; }
.chat-desc  { font-size: .7rem; color: var(--muted); margin-top: .05rem; }

/* Bouton engrenage admin */
.btn-admin-gear {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  padding: .2rem .4rem;
  opacity: .3;
  transition: opacity .2s;
  margin-left: .4rem;
}

.btn-admin-gear:hover        { opacity: 1; }
.btn-admin-gear.active       { opacity: 1; filter: drop-shadow(0 0 4px var(--red)); }

/* Bandeau mode admin */
.admin-bar {
  background: #1a0a0a;
  border-bottom: 1px solid #3a1a1a;
  padding: .4rem 1.4rem;
  font-size: .68rem;
  color: #aa5a5a;
  display: none;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.admin-bar.show { display: flex; }

.btn-exit-admin {
  background: transparent;
  border: 1px solid #3a1a1a;
  color: #aa5a5a;
  padding: .2rem .6rem;
  border-radius: 2px;
  cursor: pointer;
  font-size: .65rem;
  font-family: var(--font-body);
}

.btn-exit-admin:hover { border-color: var(--red); color: var(--white); }

/* ── MESSAGES ────────────────────────────────────────────────── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.4rem;
  display: flex;
  flex-direction: column;
  gap: .5rem;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar       { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

/* Séparateur de date */
.day-sep { text-align: center; margin: .8rem 0; position: relative; }

.day-sep::before {
  content: "";
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: var(--border);
}

.day-sep span {
  position: relative;
  background: var(--black);
  padding: 0 .8rem;
  font-size: .6rem;
  color: #444;
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* Bulle de message */
.msg {
  display: flex;
  flex-direction: column;
  max-width: 72%;
  animation: msgIn .18s ease; /* ✅ @keyframes msgIn défini dans fts.css */
}

.msg.own   { align-self: flex-end;   align-items: flex-end; }
.msg.other { align-self: flex-start; align-items: flex-start; }

.msg-meta {
  font-size: .62rem;
  color: #555;
  margin-bottom: .2rem;
  display: flex;
  align-items: center;
  gap: .4rem;
}

.msg.own .msg-meta { flex-direction: row-reverse; }

.msg-author { color: var(--gold); font-weight: 500; }

.msg-bubble {
  padding: .55rem .85rem;
  border-radius: 3px;
  font-size: .83rem;
  line-height: 1.55;
  word-break: break-word;
}

.msg.own .msg-bubble {
  background: rgba(212,32,26,.15);
  border: 1px solid rgba(212,32,26,.25);
  border-bottom-right-radius: 0;
}

.msg.other .msg-bubble {
  background: #141414;
  border: 1px solid var(--border);
  border-bottom-left-radius: 0;
}

.btn-del-msg {
  background: transparent;
  border: none;
  color: #555;
  cursor: pointer;
  font-size: .7rem;
  padding: .15rem .4rem;
  transition: color .2s;
  margin-top: .2rem;
  display: block;
}

.btn-del-msg:hover { color: var(--red); }

/* ── ZONE DE SAISIE ──────────────────────────────────────────── */
.input-area {
  padding: .9rem 1.4rem;
  padding-bottom: calc(.9rem + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  background: var(--grey2);
  flex-shrink: 0;
}

.input-row  { display: flex; gap: .6rem; align-items: flex-end; }

.input-wrap {
  flex: 1;
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: flex-end;
  transition: border-color .2s;
}

.input-wrap:focus-within { border-color: rgba(212,32,26,.4); }

.msg-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--white);
  font-family: var(--font-body);
  font-size: .83rem;
  padding: .65rem .85rem;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.5;
}

.msg-input::placeholder { color: #444; }

.btn-send {
  background: var(--red);
  border: none;
  color: var(--white);
  width: 38px;
  height: 38px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
  flex-shrink: 0;
  font-size: 1rem;
}

.btn-send:hover { background: #b71815; }

.btn-attach {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 38px;
  height: 38px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
  font-size: 1rem;
}

.btn-attach:hover { border-color: var(--gold); color: var(--gold); }

/* Barre de progression upload */
.upload-bar {
  display: none;
  padding: .5rem 1.4rem;
  background: #0e0e0e;
  border-top: 1px solid var(--border);
  font-size: .72rem;
  color: var(--muted);
  flex-shrink: 0;
  align-items: center;
  gap: .8rem;
}

.upload-bar.show { display: flex; }

.upload-track {
  flex: 1;
  background: #2a2a2a;
  border-radius: 2px;
  height: 4px;
  overflow: hidden;
}

.upload-fill {
  height: 100%;
  background: var(--red);
  width: 0%;
  transition: width .2s;
  border-radius: 2px;
}

/* ── MÉDIAS DANS LES MESSAGES ────────────────────────────────── */
.msg-img {
  max-width: 100%;
  max-height: 260px;
  border-radius: 3px;
  margin-top: .3rem;
  display: block;
  cursor: pointer;
}

.msg-video {
  max-width: 100%;
  max-height: 260px;
  border-radius: 3px;
  margin-top: .3rem;
  display: block;
}

.msg-pdf {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  margin-top: .3rem;
  padding: .4rem .8rem;
  background: #141414;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: .75rem;
  color: var(--gold);
  text-decoration: none;
}

.msg-pdf:hover { border-color: var(--gold); }

/* ── MODALE FORUM (variante spécifique) ──────────────────────────
   .modal-overlay et .modal-overlay.hidden → déjà dans fts.css ✅
   .modal-box dans fts.css → forum utilise .modal (nom différent)
──────────────────────────────────────────────────────────────── */
.modal {
  background: var(--grey);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 2rem;
  width: 95%;
  max-width: 450px;
  animation: modalIn .25s ease;
  max-height: 90vh;
  overflow-y: auto;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(.95); }
  to   { opacity: 1; transform: scale(1); }
}

.modal-icon  { font-size: 2rem; text-align: center; margin-bottom: .5rem; }
.modal-title { font-family: var(--font-display); font-size: 1.8rem; text-align: center; margin-bottom: .3rem; }
.modal-desc  { font-size: .78rem; color: var(--muted); text-align: center; line-height: 1.5; margin-bottom: 1.2rem; }
.modal-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .5rem; display: block; }

.modal-input {
  width: 100%;
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--white);
  font-family: var(--font-body);
  font-size: .85rem;
  padding: .65rem .9rem;
  outline: none;
  transition: border-color .2s;
  margin-bottom: .8rem;
}

.modal-input:focus { border-color: var(--red); }

.modal-btn {
  width: 100%;
  margin-top: .8rem;
  padding: .8rem;
  background: var(--red);
  border: none;
  color: var(--white);
  font-family: var(--font-display);
  font-size: 1.1rem;
  letter-spacing: .08em;
  border-radius: 3px;
  cursor: pointer;
  transition: background .2s;
}

.modal-btn:hover { background: #b71815; }

.modal-btn.secondary {
  background: transparent;
  border: 1px solid #333;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: .8rem;
  letter-spacing: 0;
  margin-top: .4rem;
}

.modal-err  { font-size: .72rem; color: var(--red); text-align: center; min-height: 1rem; margin-bottom: .3rem; }
.modal-row  { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }

/* ── PILLS — OVERRIDE (forum : carré, pas rond) ─────────────────
   fts.css définit border-radius: 20px sur .pill
   → forum utilise border-radius: 3px (design différent)
──────────────────────────────────────────────────────────────── */
.pill {
  border-radius: 3px;
  padding: .4rem .7rem;
  font-size: .75rem;
}

.pill:hover { border-color: #444; color: var(--white); }

/* ── NOTIFICATIONS ───────────────────────────────────────────── */
.btn-notif {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: .35rem .8rem;
  border-radius: 20px;
  cursor: pointer;
  font-size: .68rem;
  transition: all .2s;
  width: 100%;
  text-align: left;
  font-family: var(--font-body);
}

.btn-notif:hover  { border-color: var(--gold); color: var(--gold); }
.btn-notif.on     { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.1); }

.notif-banner {
  background: linear-gradient(135deg, rgba(212,32,26,.15), rgba(201,168,76,.1));
  border-bottom: 1px solid rgba(212,32,26,.3);
  padding: .8rem 1.4rem;
  display: flex;
  align-items: center;
  gap: .8rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .2s;
}

.notif-banner:hover       { background: linear-gradient(135deg, rgba(212,32,26,.25), rgba(201,168,76,.15)); }
.notif-banner.hidden      { display: none; }
.notif-banner-icon        { font-size: 1.4rem; flex-shrink: 0; }
.notif-banner-text        { flex: 1; }
.notif-banner-title       { font-size: .8rem; font-weight: 500; color: var(--white); margin-bottom: .1rem; }
.notif-banner-sub         { font-size: .68rem; color: var(--muted); }

.notif-banner-btn {
  background: var(--red);
  border: none;
  color: var(--white);
  padding: .45rem 1rem;
  border-radius: 20px;
  font-size: .75rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}

.notif-banner-close {
  background: transparent;
  border: none;
  color: #555;
  font-size: 1rem;
  cursor: pointer;
  padding: .2rem;
  flex-shrink: 0;
  line-height: 1;
}

.notif-banner-close:hover { color: var(--muted); }

/* ── RESPONSIVE MOBILE ───────────────────────────────────────── */
@media (max-width: 640px) {
  .sidebar {
    width: 100%;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-hdr,
  .sidebar-user,
  .channels-lbl,
  .sidebar-footer { display: none; }

  .channel-list {
    display: flex;
    flex-direction: row;
    padding: .4rem .5rem;
    gap: .3rem;
    overflow-x: auto;
    width: 100%;
  }

  .channel {
    padding: .4rem .75rem;
    border-left: none;
    border-bottom: 2px solid transparent;
    border-radius: 3px;
    white-space: nowrap;
    font-size: .75rem;
  }

  .channel.active { border-bottom-color: var(--red); background: rgba(212,32,26,.08); }

  .app     { flex-direction: column; }
  .main    { flex: 1; min-height: 0; }
  .messages { padding: .8rem; }
  .msg     { max-width: 88%; }

  .input-area {
    padding: .7rem .8rem;
    padding-bottom: calc(.7rem + env(safe-area-inset-bottom));
  }
}
</style>
</head>

<body>

<!-- ══ MODALE INSCRIPTION ════════════════════════════════════════
     .modal-overlay + .hidden → fts.css ✅
═════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="reg-modal">
  <div class="modal">
    <div class="modal-icon">🎭</div>
    <div class="modal-title">Inscription</div>
    <div class="modal-row">
      <div>
        <label class="modal-label">Prénom</label>
        <input class="modal-input" id="reg-first" type="text" placeholder="Prénom…" maxlength="24">
      </div>
      <div>
        <label class="modal-label">Nom</label>
        <input class="modal-input" id="reg-last" type="text" placeholder="Nom…" maxlength="24">
      </div>
    </div>
    <label class="modal-label">Discipline(s)</label>
    <!-- ✅ .pill-container → fts.css | .pill override local (3px radius) -->
    <div class="pill-container" id="reg-cat-pills"></div>
    <label class="modal-label">Créneau(x)</label>
    <div class="pill-container" id="reg-sub-pills"></div>
    <div class="modal-err" id="reg-err"></div>
    <button class="modal-btn" onclick="submitRegistration()">Rejoindre le forum →</button>
  </div>
</div>

<!-- ══ MODALE ADMIN ══════════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="admin-modal">
  <div class="modal">
    <div class="modal-icon">⚙️</div>
    <div class="modal-title">Administration</div>
    <input class="modal-input" id="admin-pwd-input" type="password" placeholder="Mot de passe…" style="margin-top:1rem">
    <div class="modal-err" id="admin-err"></div>
    <button class="modal-btn" onclick="checkAdminPwd()">Accéder →</button>
    <button class="modal-btn secondary" onclick="closeAdminModal()">Annuler</button>
  </div>
</div>

<!-- ══ APP SHELL ═════════════════════════════════════════════════ -->
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-hdr">
      <div class="sidebar-logo">FAIS TON SHOW</div>
      <div class="sidebar-sub">Forum</div>
    </div>
    <div class="sidebar-user" onclick="editRegistration()">
      <div class="uavatar" id="uavatar">?</div>
      <div class="uname"   id="uname">…</div>
      <div class="uedit">✏️</div>
    </div>
    <div class="channels-lbl">Canaux</div>
    <div class="channel-list" id="channel-list"></div>
    <div class="sidebar-footer" style="display:flex;flex-direction:column;gap:.5rem">
      <button class="btn-notif" id="btn-notif" onclick="toggleNotifications()">🔕 Activer les notifs</button>
      <a class="back-link" href="membres.html">← Espace membres</a>
    </div>
  </div>

  <!-- Zone principale -->
  <div class="main">
    <div class="pending-bar" id="pending-bar">⏳ Inscription en attente de validation</div>
    <div class="admin-bar"   id="admin-bar">
      ⚠️ Mode administration
      <button class="btn-exit-admin" onclick="exitAdmin()">Quitter</button>
    </div>
    <div class="chat-hdr">
      <div class="chat-icon"  id="ch-icon">💬</div>
      <div>
        <div class="chat-title" id="ch-title">Général</div>
        <div class="chat-desc"  id="ch-desc">Discussion ouverte à tous</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:.3rem">
        <button class="btn-admin-gear" id="btn-gear" onclick="openAdminModal()">⚙️</button>
      </div>
    </div>

    <!-- Bannière notifications -->
    <div class="notif-banner hidden" id="notif-banner">
      <span class="notif-banner-icon">🔔</span>
      <div class="notif-banner-text">
        <div class="notif-banner-title">Ne rate aucun message !</div>
        <div class="notif-banner-sub">Active les notifications pour ton groupe</div>
      </div>
      <button class="notif-banner-btn"   onclick="activerNotifs()">Activer</button>
      <button class="notif-banner-close" onclick="fermerBanniere()">✕</button>
    </div>

    <!-- Liste des messages -->
    <div class="messages" id="messages"></div>

    <!-- Barre de progression upload -->
    <div class="upload-bar" id="upload-bar">
      <span id="upload-txt">Upload en cours…</span>
      <div class="upload-track">
        <div class="upload-fill" id="upload-fill"></div>
      </div>
    </div>

    <!-- Zone de saisie -->
    <div class="input-area">
      <div class="input-row">
        <input type="file" id="file-input"
               accept="image/*,video/*,.pdf,.mp3"
               style="display:none"
               onchange="uploadMedia(this.files[0])">
        <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="Joindre un fichier">📎</button>
        <div class="input-wrap">
          <textarea class="msg-input" id="msg-input"
                    placeholder="Écris un message…" rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"></textarea>
        </div>
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->


<!-- ══ SCRIPTS ═══════════════════════════════════════════════════

  Ordre de chargement :
  1. Firebase SDK (déjà chargé en <head>)
  2. fts-utils.js  → expose FTS.norm, FTS.esc, FTS.store,
                      FTS.genUID, FTS.parseCSVRaw, FTS.catIcon,
                      FTS.scrollBottom, FTS.fetch, FTS.CLOUDINARY
  3. fts-firebase.js → expose FTS.FIREBASE, FTS.SHEETS, FTS.PUSH,
                       FTS.initFirebase()
  4. Script page    → logique forum (utilise FTS.* + firebase global)
  5. fts-pwa.js     → enregistre le SW (nécessaire pour push notifs)

═════════════════════════════════════════════════════════════════ -->
<script src="assets/js/fts-utils.js"></script>
<script src="assets/js/fts-firebase.js"></script>

<script>
/* ================================================================
   FORUM.JS — Logique spécifique au forum
   
   Remplacements opérés (fonctionnalités identiques) :
   
   SUPPRIMÉ → REMPLACÉ PAR
   ─────────────────────────────────────────
   FIREBASE_CONFIG      → FTS.FIREBASE          (fts-firebase.js)
   SHEET_URL            → FTS.SHEETS.ressources  (fts-firebase.js)
   CLOUD_NAME           → FTS.CLOUDINARY.cloudName
   UPLOAD_PRESET        → FTS.CLOUDINARY.uploadPreset
   WORKER_URL           → FTS.PUSH.workerUrl
   VAPID_PUBLIC_KEY     → FTS.PUSH.vapidPublicKey
   function norm()      → FTS.norm()             (fts-utils.js)
   function esc()       → FTS.esc()              (fts-utils.js)
   function catIcon()   → FTS.catIcon()          (fts-utils.js)
   function storageGet  → FTS.store.get()        (fts-utils.js)
   function storageSet  → FTS.store.set()        (fts-utils.js)
   function genUID()    → FTS.genUID()           (fts-utils.js)
   function scrollBottom() → FTS.scrollBottom()  (fts-utils.js)
   function parseCSV()  → FTS.parseCSVRaw()      (fts-utils.js)
   firebase.initializeApp() → FTS.initFirebase() (fts-firebase.js)
   
   Toute la logique métier (Firebase, chat, push, upload)
   est conservée à l'identique.
   ================================================================ */

/* ── MOT DE PASSE ADMIN (spécifique à cette page) ───────────── */
const ADMIN_PWD = "admin2026";   // ⚠️ TODO → Firebase Auth

/* ── ÉTAT ────────────────────────────────────────────────────── */
let db, firebaseOk = false;
let uid, userData;
let currentChannel  = "general";
let currentListener = null;
let adminMode       = false;
let allGroups       = [];

/* ── INITIALISATION ──────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", async function() {
  // ✅ FTS.initFirebase() remplace firebase.initializeApp(FIREBASE_CONFIG) + firebase.database()
  db = FTS.initFirebase();
  if (db) firebaseOk = true;

  await loadGroups();

  // ✅ FTS.store.get() remplace localStorage.getItem()
  uid = FTS.store.get("fts_forum_uid");
  if (uid && firebaseOk) { await loadUserData(); } else { showRegModal(); }
});

/* ── CHARGEMENT DES GROUPES (depuis Google Sheets) ───────────── */
async function loadGroups() {
  try {
    // ✅ FTS.fetch() remplace fetch() + FTS.SHEETS.ressources remplace SHEET_URL
    const r    = await FTS.fetch(FTS.SHEETS.ressources);
    const text = await r.text();
    // ✅ FTS.parseCSVRaw() remplace parseCSV() locale
    const rows = FTS.parseCSVRaw(text);
    allGroups  = [];
    rows.forEach(row => {
      const cat = (row[0] || "").trim();
      const sub = (row[1] || "").trim();
      if (cat) { allGroups.push({ cat, sub }); }
    });
    buildCatPills();
  } catch(e) { console.error(e); }
}

/* ── CONSTRUCTION DES PILLS DE CATÉGORIES ────────────────────── */
function buildCatPills() {
  const cats = [...new Set(allGroups.map(g => g.cat))];
  const cont = document.getElementById("reg-cat-pills");
  // ✅ FTS.esc() remplace esc()
  cont.innerHTML = cats.map(c =>
    `<div class="pill" onclick="togglePill(this,'cat')">${FTS.esc(c)}</div>`
  ).join("");
}

function togglePill(el, type) {
  el.classList.toggle("active");
  if (type === 'cat') updateSubPills();
}

function updateSubPills() {
  const activeCats    = Array.from(document.querySelectorAll("#reg-cat-pills .pill.active")).map(p => p.textContent);
  const subs          = [...new Set(allGroups.filter(g => activeCats.includes(g.cat)).map(g => g.sub).filter(Boolean))];
  const cont          = document.getElementById("reg-sub-pills");
  const currentActive = Array.from(document.querySelectorAll("#reg-sub-pills .pill.active")).map(p => p.textContent);

  cont.innerHTML = subs.map(s => {
    const isActive = currentActive.includes(s) ? " active" : "";
    // ✅ FTS.esc()
    return `<div class="pill${isActive}" onclick="togglePill(this,'sub')">${FTS.esc(s)}</div>`;
  }).join("");
}

function showRegModal() {
  document.getElementById("reg-err").textContent = "";
  document.getElementById("reg-modal").classList.remove("hidden");
}

/* ── INSCRIPTION ─────────────────────────────────────────────── */
async function submitRegistration() {
  const first = document.getElementById("reg-first").value.trim();
  const last  = document.getElementById("reg-last").value.trim();
  const cats  = Array.from(document.querySelectorAll("#reg-cat-pills .pill.active")).map(p => p.textContent);
  const subs  = Array.from(document.querySelectorAll("#reg-sub-pills .pill.active")).map(p => p.textContent);

  if (!first)        { document.getElementById("reg-err").textContent = "Prénom requis.";              return; }
  if (!cats.length)  { document.getElementById("reg-err").textContent = "Choisis au moins une discipline."; return; }

  // ✅ FTS.genUID() remplace genUID()
  if (!uid) uid = FTS.genUID();
  // ✅ FTS.store.set() remplace storageSet()
  FTS.store.set("fts_forum_uid", uid);

  const data = {
    name:     last ? first + " " + last : first,
    group:    cats.join(", "),
    subgroup: subs.join(", "),
    status:   "pending",
    ts:       Date.now(),
  };
  userData = data;
  await db.ref("fts_forum/users/" + uid).set(data);
  listenUserStatus();
  document.getElementById("reg-modal").classList.add("hidden");
  enterForum();
}

/* ── ÉDITION DU PROFIL ───────────────────────────────────────── */
function editRegistration() {
  if (!userData) return;
  document.getElementById("reg-first").value = userData.name.split(" ")[0];
  document.getElementById("reg-last").value  = userData.name.split(" ").slice(1).join(" ");

  const cats = (userData.group    || "").split(", ");
  const subs = (userData.subgroup || "").split(", ");

  document.querySelectorAll("#reg-cat-pills .pill").forEach(p => {
    p.classList.toggle("active", cats.includes(p.textContent));
  });
  updateSubPills();
  document.querySelectorAll("#reg-sub-pills .pill").forEach(p => {
    p.classList.toggle("active", subs.includes(p.textContent));
  });
  showRegModal();
}

/* ── CHARGEMENT UTILISATEUR ──────────────────────────────────── */
async function loadUserData() {
  const snap = await db.ref("fts_forum/users/" + uid).once("value");
  if (snap.exists()) { userData = snap.val(); listenUserStatus(); enterForum(); }
  else showRegModal();
}

function listenUserStatus() {
  db.ref("fts_forum/users/" + uid + "/status").on("value", snap => {
    if (snap.exists()) { userData.status = snap.val(); updateStatusUI(); renderChannels(); }
  });
}

function enterForum() {
  document.getElementById("uavatar").textContent = userData.name.charAt(0);
  document.getElementById("uname").textContent   = userData.name;
  updateStatusUI();
  renderChannels();
  switchChannel("general");
  checkNotifStatus();
}

function updateStatusUI() {
  document.getElementById("pending-bar").classList.toggle("show", userData.status === "pending");
}

/* ── CANAUX ──────────────────────────────────────────────────── */
function getUserChannels() {
  const channels = [{ id: "general", icon: "💬", name: "Général", desc: "Ouvert à tous" }];
  if (userData && userData.status === "active") {
    if (userData.group) {
      userData.group.split(", ").forEach(c => {
        // ✅ FTS.norm() remplace norm() | FTS.catIcon() remplace catIcon()
        channels.push({ id: FTS.norm(c), icon: FTS.catIcon(c), name: c, desc: "Canal " + c });
      });
    }
    if (userData.subgroup) {
      userData.subgroup.split(", ").forEach(s => {
        channels.push({ id: FTS.norm(s), icon: "📅", name: s, desc: "Canal créneau " + s });
      });
    }
  }
  return channels;
}

function renderChannels() {
  const list     = document.getElementById("channel-list");
  const channels = getUserChannels();
  list.innerHTML = channels.map(c =>
    `<div class="channel${c.id === currentChannel ? " active" : ""}" onclick="switchChannel('${c.id}')">
       <span class="channel-icon">${c.icon}</span>
       <span>${FTS.esc(c.name)}</span>
     </div>`
  ).join("");
}

function switchChannel(id) {
  const ch      = getUserChannels().find(c => c.id === id) || getUserChannels()[0];
  currentChannel = ch.id;
  renderChannels();
  document.getElementById("ch-icon").textContent  = ch.icon;
  document.getElementById("ch-title").textContent = ch.name;
  document.getElementById("ch-desc").textContent  = ch.desc;
  document.getElementById("messages").innerHTML   = "";
  if (currentListener) currentListener();
  loadMessages(ch.id);
}

/* ── MESSAGES ────────────────────────────────────────────────── */
function loadMessages(id) {
  const ref = db.ref("fts_forum/messages/" + id).limitToLast(50);
  ref.on("child_added", snap => {
    appendMsg(snap.val(), snap.val().name === userData.name, snap.key);
  });
  currentListener = () => ref.off();
}

function sendMessage() {
  const input = document.getElementById("msg-input");
  const txt   = input.value.trim();
  if (!txt) return;
  db.ref("fts_forum/messages/" + currentChannel).push({
    name: userData.name, text: txt, ts: Date.now()
  });
  notifyChannel(currentChannel, userData.name + " : " + txt.substring(0, 80));
  input.value = "";
  input.style.height = "";
}

function appendMsg(m, own, key) {
  const wrap    = document.getElementById("messages");
  const div     = document.createElement("div");
  div.className = "msg " + (own ? "own" : "other");

  const isMedia  = m.text && m.text.startsWith("[media]");
  const mediaUrl = isMedia ? m.text.slice(7) : null;

  div.innerHTML = `
    <div class="msg-meta">
      ${!own ? `<span class="msg-author">${FTS.esc(m.name)}</span>` : ""}
      <span>${new Date(m.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>
    </div>
    ${isMedia
      ? `<div class="msg-bubble">${renderMedia(mediaUrl)}</div>`
      : `<div class="msg-bubble">${FTS.esc(m.text).replace(/\n/g, "<br>")}</div>`
    }
    ${adminMode ? `<button class="btn-del-msg" onclick="deleteMsg('${key}')">🗑</button>` : ""}`;

  wrap.appendChild(div);
  // ✅ FTS.scrollBottom() remplace scrollBottom()
  FTS.scrollBottom(wrap);
}

function deleteMsg(k) {
  if (confirm("Supprimer ce message ?")) {
    db.ref("fts_forum/messages/" + currentChannel + "/" + k).remove();
  }
}

/* ── ADMIN ───────────────────────────────────────────────────── */
function openAdminModal()  { document.getElementById("admin-modal").classList.remove("hidden"); }
function closeAdminModal() { document.getElementById("admin-modal").classList.add("hidden"); }

function checkAdminPwd() {
  if (document.getElementById("admin-pwd-input").value === ADMIN_PWD) {
    closeAdminModal();
    adminMode = true;
    document.getElementById("admin-bar").classList.add("show");
    switchChannel(currentChannel);
  }
}

function exitAdmin() {
  adminMode = false;
  document.getElementById("admin-bar").classList.remove("show");
  switchChannel(currentChannel);
}

/* ── SAISIE ──────────────────────────────────────────────────── */
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

/* ── UPLOAD MÉDIA ────────────────────────────────────────────── */
function uploadMedia(file) {
  if (!file) return;
  if (file.size > 100 * 1024 * 1024) { alert("Fichier trop volumineux (max 100 Mo)"); return; }

  const bar  = document.getElementById("upload-bar");
  const fill = document.getElementById("upload-fill");
  const txt  = document.getElementById("upload-txt");

  bar.classList.add("show");
  fill.style.width      = "0%";
  fill.style.background = "var(--red)";
  txt.textContent       = "Upload en cours…";

  const cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/[^a-zA-Z0-9_-]/g, "_");
  const fd        = new FormData();
  fd.append("file",          file);
  // ✅ FTS.CLOUDINARY.uploadPreset remplace UPLOAD_PRESET
  fd.append("upload_preset", FTS.CLOUDINARY.uploadPreset);
  fd.append("public_id",     "forum/" + cleanName);
  fd.append("resource_type", "auto");

  const xhr = new XMLHttpRequest();
  // ✅ FTS.CLOUDINARY.cloudName remplace CLOUD_NAME
  xhr.open("POST", "https://api.cloudinary.com/v1_1/" + FTS.CLOUDINARY.cloudName + "/auto/upload");

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      const pct = Math.round(e.loaded / e.total * 100);
      fill.style.width = pct + "%";
      txt.textContent  = "Upload " + pct + "%…";
    }
  };

  xhr.onload = function() {
    if (xhr.status === 200) {
      const res = JSON.parse(xhr.responseText);
      fill.style.background = "#22c55e";
      txt.textContent       = "✓ " + file.name;
      setTimeout(function() { bar.classList.remove("show"); }, 2000);
      document.getElementById("file-input").value = "";
      if (firebaseOk && userData) {
        db.ref("fts_forum/messages/" + currentChannel).push({
          name: userData.name, text: "[media]" + res.secure_url, ts: Date.now()
        });
      }
    } else {
      txt.textContent = "Erreur upload";
      setTimeout(function() { bar.classList.remove("show"); }, 3000);
    }
  };

  xhr.onerror = function() {
    txt.textContent = "Erreur réseau";
    setTimeout(function() { bar.classList.remove("show"); }, 3000);
  };

  xhr.send(fd);
}

/* ── RENDU MÉDIAS ────────────────────────────────────────────── */
function renderMedia(url) {
  const isCloudImg   = url.includes("/image/upload/");
  const isCloudVideo = url.includes("/video/upload/");
  const ext          = url.split("?")[0].split(".").pop().toLowerCase();
  const isImg   = isCloudImg  || ["jpg","jpeg","png","gif","webp"].includes(ext);
  const isVideo = (isCloudVideo && !["mp3","wav","ogg","aac","m4a"].includes(ext)) || ["mp4","mov","webm"].includes(ext);
  const isAudio = ["mp3","wav","ogg","aac","m4a"].includes(ext) || (isCloudVideo && ["mp3","wav","ogg","aac","m4a"].includes(ext));
  const isPdf   = ext === "pdf";

  if (isImg)   return `<img class="msg-img" src="${url}" onclick="window.open('${url}')">`;
  if (isVideo) return `<video class="msg-video" src="${url}" controls playsinline></video>`;
  if (isAudio) {
    const fname = decodeURIComponent(url.split("/").pop().split("?")[0]);
    return `<div style="margin-top:.4rem">
      <div style="font-size:.72rem;color:var(--gold);margin-bottom:.3rem;display:flex;align-items:center;gap:.4rem">🎵 ${fname}</div>
      <audio controls preload="none" style="width:100%;min-width:200px;display:block"><source src="${url}" type="audio/mpeg"></audio>
      <a href="${url}" target="_blank" rel="noopener" style="font-size:.65rem;color:var(--muted);text-decoration:none;display:block;margin-top:.2rem">Écouter / Télécharger</a>
    </div>`;
  }
  if (isPdf) return `<a class="msg-pdf" href="${url}" target="_blank" rel="noopener">📄 Ouvrir le PDF</a>`;
  return `<a class="msg-pdf" href="${url}" target="_blank" rel="noopener">📎 Fichier joint</a>`;
}

/* ── NOTIFICATIONS PUSH ──────────────────────────────────────── */
function urlBase64ToUint8Array(b64) {
  const pad    = "=".repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw    = window.atob(base64);
  const arr    = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

async function getSubscription() {
  if (!("serviceWorker" in navigator)) return null;
  const reg = await navigator.serviceWorker.ready;
  return reg.pushManager.getSubscription();
}

async function checkNotifStatus() {
  const sub    = await getSubscription();
  const banner = document.getElementById("notif-banner");
  updateNotifBtn(!!sub);
  // ✅ FTS.store.get() remplace storageGet()
  if (!sub && Notification.permission !== "denied" && !FTS.store.get("fts_notif_dismissed")) {
    banner.classList.remove("hidden");
  } else {
    banner.classList.add("hidden");
  }
}

async function activerNotifs() {
  document.getElementById("notif-banner").classList.add("hidden");
  await subscribePush();
}

function fermerBanniere() {
  document.getElementById("notif-banner").classList.add("hidden");
  // ✅ FTS.store.set() remplace storageSet()
  FTS.store.set("fts_notif_dismissed", "1");
}

function updateNotifBtn(on) {
  const btn = document.getElementById("btn-notif");
  if (!btn) return;
  btn.textContent = on ? "🔔 Notifs activées" : "🔕 Activer les notifs";
  btn.classList.toggle("on", on);
}

async function toggleNotifications() {
  const sub = await getSubscription();
  if (sub) {
    await sub.unsubscribe();
    // ✅ FTS.PUSH.workerUrl remplace WORKER_URL
    fetch(FTS.PUSH.workerUrl + "/unsubscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uid }),
    }).catch(() => {});
    updateNotifBtn(false);
  } else {
    await subscribePush();
  }
}

async function subscribePush() {
  try {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { alert("Autorise les notifications pour continuer."); return; }
    const reg = await navigator.serviceWorker.ready;
    // ✅ FTS.PUSH.vapidPublicKey remplace VAPID_PUBLIC_KEY
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly:      true,
      applicationServerKey: urlBase64ToUint8Array(FTS.PUSH.vapidPublicKey),
    });
    // ✅ FTS.PUSH.workerUrl remplace WORKER_URL
    await fetch(FTS.PUSH.workerUrl + "/subscribe", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({
        uid,
        subscription: sub.toJSON(),
        group:        userData ? userData.group    : "",
        subgroup:     userData ? userData.subgroup : "",
      }),
    });
    updateNotifBtn(true);
  } catch(e) {
    console.error("Push:", e);
    alert("Erreur notifications : " + e.message);
  }
}

function notifyChannel(channel, body) {
  const ch       = getUserChannels().find(c => c.id === channel) || { name: "Forum" };
  let group      = "";
  let subgroup   = "";
  if (userData) {
    // ✅ FTS.norm() remplace norm()
    (userData.group    || "").split(", ").forEach(g => { if (FTS.norm(g) === channel) group    = g; });
    (userData.subgroup || "").split(", ").forEach(s => { if (FTS.norm(s) === channel) subgroup = s; });
  }
  // ✅ FTS.PUSH.workerUrl remplace WORKER_URL
  fetch(FTS.PUSH.workerUrl + "/notify", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({
      group, subgroup,
      title:     "FTS — " + ch.name,
      body,
      url:       "/forum.html",
      senderUid: uid,
    }),
  }).catch(() => {});
}
</script>
